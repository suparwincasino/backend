name: Node.js CI/CD - SuperWin Casino Backend
on:
  push:
    branches: ["main"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
      - run: npm ci
      - run: npx webpack --mode production
      - run: npm test
      - run: docker build -t superwincasino-backend:latest ./backend
      - uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - run: |
          docker tag superwincasino-backend:latest ${{ secrets.DOCKER_USERNAME }}/superwincasino-backend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/superwincasino-backend:latest
