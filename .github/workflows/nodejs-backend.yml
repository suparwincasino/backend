name: Node.js CI/CD - SuperWin Casino Backend

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      # 1️⃣ Checkout repository
      - uses: actions/checkout@v4

      # 2️⃣ Setup Node.js
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      # 3️⃣ Install backend dependencies
      - name: Install Backend Dependencies
        run: npm ci

      # 4️⃣ Build backend (Webpack/Nitro)
      - name: Build Backend
        run: npx webpack --mode production

      # 5️⃣ Run backend tests
      - name: Run Backend Tests
        run: npm test

      # 6️⃣ Build Docker image
      - name: Build Docker Image
        run: docker build -t superwincasino-backend:latest .

      # 7️⃣ Docker login (if pushing to registry)
      - name: Docker Login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 8️⃣ Push Docker image to registry (optional)
      - name: Push Docker Image
        run: |
          docker tag superwincasino-backend:latest ${{ secrets.DOCKER_USERNAME }}/superwincasino-backend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/superwincasino-backend:latest
