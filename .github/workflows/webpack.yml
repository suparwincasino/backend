name: Backend Build & Docker Deploy

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      # 1️⃣ Checkout repo
      - uses: actions/checkout@v4

      # 2️⃣ Setup Node.js
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      # 3️⃣ Install dependencies
      - name: Install Backend Dependencies
        run: npm ci

      # 4️⃣ Build backend with Webpack (or Nitro build)
      - name: Build Backend
        run: npx webpack --mode production

      # 5️⃣ Run backend tests
      - name: Run Tests
        run: npm test

      # 6️⃣ Build Docker image
      - name: Build Docker Image
        run: |
          docker build -t supermegawin-backend:latest .

      # 7️⃣ Log in to Docker registry (optional, if pushing)
      - name: Docker Login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 8️⃣ Push Docker image to registry (optional)
      - name: Push Docker Image
        run: |
          docker tag supermegawin-backend:latest ${{ secrets.DOCKER_USERNAME }}/supermegawin-backend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/supermegawin-backend:latest

      # 9️⃣ Deploy to VPS via SSH (optional)
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/supermegawin-backend:latest
            docker stop supermegawin-backend || true
            docker rm supermegawin-backend || true
            docker run -d \
              --name supermegawin-backend \
              -p 3000:3000 \
              -e NODE_ENV=production \
              -e CONVEX_URL=${{ secrets.CONVEX_URL }} \
              ${{ secrets.DOCKER_USERNAME }}/supermegawin-backend:latest
